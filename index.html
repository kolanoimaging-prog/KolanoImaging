<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KolanoImaging</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background-color: #f8f8f8; }
        h1 { font-size: 48px; margin-bottom: 50px; }
        .sections { display: flex; justify-content: center; flex-wrap: wrap; gap: 50px; }
        .section { text-align: center; }
        .section img { width: 300px; height: 200px; object-fit: cover; border-radius: 12px; cursor: pointer; transition: transform 0.3s; }
        .section img:hover { transform: scale(1.05); }
        .caption { font-size: 24px; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>KolanoImaging</h1>
    <div class="sections">
        <div class="section">
            <a href="music.html">
                <img src="music-cover.jpg" alt="Music">
                <div class="caption">Music</div>
            </a>
        </div>
        <div class="section">
            <a href="photography.html">
                <img src="photography-cover.jpg" alt="Photography">
                <div class="caption">Photography</div>
            </a>
        </div>
    </div>
</body>
</html>
